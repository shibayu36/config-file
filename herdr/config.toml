onboarding = false
[keys]
prefix = "ctrl+t"

new_tab = "prefix+ctrl+c"
new_workspace = "prefix+c"
previous_tab = "prefix+ctrl+p"
next_tab = "prefix+ctrl+n"
previous_workspace = "prefix+p"
next_workspace = "prefix+n"
open_notification_target = ""
cycle_pane_next = ["prefix+tab", "prefix+o"]

split_horizontal = ["prefix+minus", "prefix+2"]
split_vertical = ["prefix+v", "prefix+3"]

detach = ["prefix+q", "prefix+d", "prefix+ctrl+d"]
rename_tab = ["prefix+shift+t", "prefix+shift+a"]

[ui]
prompt_new_tab_name = false

agent_panel_sort = "spaces"

[ui.sound]
enabled = false

[[keys.command]]
key = "prefix+t"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "Open scratch terminal"
width = "95%"
height = "95%"
